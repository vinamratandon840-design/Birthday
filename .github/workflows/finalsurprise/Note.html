<script src="./script.js"></script>
<script>
  // Graceful fallback for missing photos — keeps the same visual language
  // as the gallery placeholders on the main site.
  document.querySelectorAll('.paper.image img').forEach(function(img){
    img.addEventListener('error', function(){
      var ph = document.createElement('div');
      ph.className = 'img-placeholder';
      ph.innerHTML = '📷<span>add your photo here</span>';
      img.replaceWith(ph);
    });
  });

  // Soft floating hearts in the background, to match the envelope theme
  var heartsBg = document.getElementById('heartsBg');
  var heartEmojis = ['💗','💛','✨'];
  for (var i = 0; i < 18; i++) {
    var h = document.createElement('span');
    h.className = 'bg-heart';
    h.textContent = heartEmojis[Math.floor(Math.random() * heartEmojis.length)];
    h.style.left = Math.random() * 100 + 'vw';
    h.style.animationDelay = (Math.random() * 8) + 's';
    h.style.animationDuration = (10 + Math.random() * 8) + 's';
    h.style.fontSize = (0.8 + Math.random() * 1) + 'rem';
    heartsBg.appendChild(h);
  }

  // ---------- Fade transitions to match index.html ----------
  window.addEventListener('load', function(){
    requestAnimationFrame(function(){
      document.body.classList.add('loaded');
    });
  });

  document.getElementById('closeBtn').addEventListener('click', function(){
    document.body.classList.remove('loaded');
    setTimeout(function(){ window.location.href = 'main.html#finale'; }, 550);
  });
</script>
