<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">
<html xml:lang="en" xmlns="http://www.w3.org/1999/xhtml">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HBD love</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,600;0,700;1,600&family=Quicksand:wght@400;500;600;700&family=Dancing+Script:wght@600;700&display=swap" rel="stylesheet">
    <link type="text/css" rel="stylesheet" href="default.css">
    <script type="text/javascript" src="jquery_min.js"></script>
    <script type="text/javascript" src="jscex_min.js"></script>
    <script type="text/javascript" src="jscex-parser.js"></script>
    <script type="text/javascript" src="jscex-jit.js"></script>
    <script type="text/javascript" src="jscex-builderbase_min.js"></script>
    <script type="text/javascript" src="jscex-async_min.js"></script>
    <script type="text/javascript" src="jscex-async-powerpack_min.js"></script>
    <script type="text/javascript" src="functions.js" charset="utf-8"></script>
    <script type="text/javascript" src="love.js" charset="utf-8"></script>
    <script>
        function playAudio() {
            var audio = document.getElementById("myAudio");
            audio.play();
        }
    </script>
    <style>
        :root{
            --midnight:#0b0f2b;
            --gold:#f4c95d;
            --pink:#ff6f9c;
            --cream:#fdf6e8;
            --teal:#5ee6c5;
        }
        body{ font-family:'Quicksand', sans-serif; }
        #continue-wrap{
            display:none;
            position:absolute;
            left:0;
            right:0;
            bottom:24px;
            text-align:center;
            z-index:20;
        }
        #continue-wrap p{
            font-family:'Dancing Script', cursive;
            font-size:1.4rem;
            color:var(--gold);
            margin-bottom:14px;
            text-shadow:0 2px 10px rgba(0,0,0,.5);
        }
        #continueBtn{
            background:linear-gradient(135deg, var(--gold), var(--pink));
            border:none;
            color:var(--midnight);
            font-family:'Quicksand',sans-serif;
            font-weight:700;
            font-size:1rem;
            padding:14px 34px;
            border-radius:100px;
            cursor:pointer;
            letter-spacing:.03em;
            box-shadow:0 10px 30px rgba(244,201,93,.35);
            transition:transform .25s ease, box-shadow .25s ease;
            text-decoration:none;
            display:inline-block;
        }
        #continueBtn:hover{
            transform:translateY(-3px);
            box-shadow:0 14px 36px rgba(244,201,93,.5);
        }
        #wrap{
            perspective: 1000px;
        }
        #text{
            z-index: 5;
        }
        #canvas{
            position: relative;
            z-index: 1;
            transition: background-color 1.1s ease-in-out;
            background-color: transparent;
        }
    </style>
</head>
<body>
    <div id="main">
        <div id="error">Your browser doesn't support Canvas. Please open this page in a modern browser like Chrome, Firefox, or Edge.</div>
        <audio autoplay="autoplay" height="100" width="100" id="myAudio">
            <source src="aud.mp3" type="audio/mpeg" />
            <embed height="100" width="100" src="aud.mp3" />
        </audio>
        <div id="wrap">
            <div id="text">
                <div id="code">
                    <span class="say">Happy Birthday Cutie 🎈</span><br>
                    <span class="say">May God bless you 🍀</span><br>
                    <span class="say">And Give u Happiness which You Deserve 💕</span><br>
                    <span class="say">Hope u have a great day today ❤️😘</span><br>
                </div>
            </div>
            
            <canvas id="canvas" width="1100" height="680"></canvas>
            <div id="continue-wrap">
                
                <a href="main.html" id="continueBtn">More To Gooo 🎈</a>
            </div>
        </div>
    </div>

    <script>
    (function() {
        var canvas = $('#canvas');
		
        if (!canvas[0].getContext) {
            $("#error").show();
            return false;
        }

        var width = canvas.width();
        var height = canvas.height();        
        canvas.attr("width", width);
        canvas.attr("height", height);

        var opts = {
            seed: {
                x: width / 2 - 20,
                color: "rgb(190, 26, 37)",
                scale: 2
            },
            branch: [
                [535, 680, 570, 250, 500, 200, 30, 100, [
                    [540, 500, 455, 417, 340, 400, 13, 100, [
                        [450, 435, 434, 430, 394, 395, 2, 40]
                    ]],
                    [550, 445, 600, 356, 680, 345, 12, 100, [
                        [578, 400, 648, 409, 661, 426, 3, 80]
                    ]],
                    [539, 281, 537, 248, 534, 217, 3, 40],
                    [546, 397, 413, 247, 328, 244, 9, 80, [
                        [427, 286, 383, 253, 371, 205, 2, 40],
                        [498, 345, 435, 315, 395, 330, 4, 60]
                    ]],
                    [546, 357, 608, 252, 678, 221, 6, 100, [
                        [590, 293, 646, 277, 648, 271, 2, 80]
                    ]]
                ]] 
            ],
            bloom: {
                num: 700,
                width: 1080,
                height: 650,
            },
            footer: {
                width: 1200,
                height: 5,
                speed: 10,
            }
        }

        var tree = new Tree(canvas[0], width, height, opts);
        var seed = tree.seed;
        var foot = tree.footer;
        var hold = 1;

        canvas.click(function(e) {
            playAudio();
            var offset = canvas.offset(), x, y;
            x = e.pageX - offset.left;
            y = e.pageY - offset.top;
            if (seed.hover(x, y)) {
                hold = 0; 
                canvas.unbind("click");
                canvas.unbind("mousemove");
                canvas.removeClass('hand');
            }
        }).mousemove(function(e) {
            var offset = canvas.offset(), x, y;
            x = e.pageX - offset.left;
            y = e.pageY - offset.top;
            canvas.toggleClass('hand', seed.hover(x, y));
        });

        var seedAnimate = eval(Jscex.compile("async", function () {
            seed.draw();
            while (hold) {
                $await(Jscex.Async.sleep(10));
            }
            while (seed.canScale()) {
                seed.scale(0.95);
                $await(Jscex.Async.sleep(10));
            }
            while (seed.canMove()) {
                seed.move(0, 2);
                foot.draw();
                $await(Jscex.Async.sleep(10));
            }
        }));

        var growAnimate = eval(Jscex.compile("async", function () {
            do {
                tree.grow();
                $await(Jscex.Async.sleep(10));
            } while (tree.canGrow());
        }));

        var flowAnimate = eval(Jscex.compile("async", function () {
            do {
                tree.flower(2);
                $await(Jscex.Async.sleep(10));
            } while (tree.canFlower());
        }));

        var moveAnimate = eval(Jscex.compile("async", function () {
            tree.snapshot("p1", 240, 0, 610, 680);
            while (tree.move("p1", 500, 0)) {
                foot.draw();
                $await(Jscex.Async.sleep(10));
            }
            foot.draw();
            tree.snapshot("p2", 500, 0, 610, 680);

            canvas.parent().css("background", "url(" + tree.toDataURL('image/png') + ")");
            canvas.css("background-color", "rgba(244, 201, 93, 0.28)");
            $await(Jscex.Async.sleep(700));
            canvas.css("background-color", "transparent");
            $await(Jscex.Async.sleep(700));
        }));

        var textAnimate = eval(Jscex.compile("async", function () {
            $("#code").fadeIn(900).typewriter();
            $await(Jscex.Async.sleep(6000));
            $("#continue-wrap").fadeIn(1200);
        }));
	    
        var runAsync = eval(Jscex.compile("async", function () {
            $await(seedAnimate());
            $await(growAnimate());
            $await(flowAnimate());
            $await(moveAnimate());
            textAnimate().start();
        }));

        runAsync().start();
    })();
    </script>
</body>
</html>
